<!doctype html><html lang="sk"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FacelessFactory — Centrála</title>
<style>
:root{
  --bg:#0a0d14; --bg2:#0d1119; --panel:#11161f; --panel2:#141b26;
  --bd:#1e2733; --bd2:#283342; --tx:#e6edf3; --mut:#8b97a8; --mut2:#5b6675;
  --acc:#3b82f6; --yt:#ff4d4f; --tk:#fe2c55; --ig:#e1306c; --ok:#22c55e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 70% -10%,#13203a22,transparent),var(--bg);
  color:var(--tx);font:16px/1.55 'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{max-width:1340px;margin:0 auto;padding:26px 26px 70px}
header{display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
h1{font-size:25px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
h1 .dot{width:10px;height:10px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok)}
.sub{color:var(--mut);font-size:14px}
.spacer{flex:1}
.btn{background:var(--panel2);border:1px solid var(--bd2);color:var(--tx);border-radius:9px;
  padding:10px 16px;font-size:14.5px;font-weight:600;cursor:pointer;display:inline-flex;gap:7px;align-items:center;transition:.15s}
.btn:hover{background:#1b2433;border-color:#39465a}
.btn.acc{background:var(--acc);border-color:var(--acc)} .btn.acc:hover{background:#2f6fd8}
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.tab{background:transparent;border:1px solid var(--bd);color:var(--mut);border-radius:10px;
  padding:11px 20px;font-size:15.5px;font-weight:600;cursor:pointer;transition:.15s}
.tab:hover{color:var(--tx);border-color:var(--bd2)}
.tab.on{background:var(--panel);border-color:var(--bd2);color:var(--tx)}
.grid{display:grid;gap:14px}
.k4{grid-template-columns:repeat(4,1fr)} .k3{grid-template-columns:repeat(3,1fr)} .k2{grid-template-columns:repeat(2,1fr)}
.wsplit{display:grid;grid-template-columns:1.6fr 1fr;gap:14px}
@media(max-width:900px){.k4,.k3{grid-template-columns:repeat(2,1fr)}.k2,.wsplit{grid-template-columns:1fr}}
@media(max-width:600px){
  .wrap{padding:16px 13px 50px}
  .k4,.k3,.k2,.wsplit{grid-template-columns:1fr}
  .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:5px;margin-bottom:16px}
  .tab{flex:0 0 auto}
  header{gap:10px}
  h1{font-size:21px}
  .kpi .big{font-size:42px}
  .card{overflow-x:auto}
  .bars .row{grid-template-columns:92px 1fr 50px;gap:8px}
  #refresh{padding:9px 13px}
}
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--bd);border-radius:14px;padding:18px}
.kpi .lab{color:var(--mut);font-size:13.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi .big{font-size:48px;font-weight:800;letter-spacing:-1.5px;margin-top:6px;line-height:1.05}
.kpi .sm{color:var(--mut);font-size:14px;margin-top:7px}
.dl{font-size:14.5px;font-weight:700;margin-top:6px}
.dl.dlu{color:var(--ok)} .dl.dld{color:#ef4444} .dl.dl0{color:var(--mut2);font-weight:600}
.dchip{display:inline-block;font-size:12px;font-weight:800;padding:1px 7px;border-radius:20px;white-space:nowrap}
.dchip.dlu{color:var(--ok);background:#22c55e1f} .dchip.dld{color:#ef4444;background:#ef44441f}
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:13px;font-weight:700}
h2{font-size:17px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:8px}
h2 small{color:var(--mut);font-weight:500;font-size:13.5px}
.bars .row{display:grid;grid-template-columns:130px 1fr 64px;align-items:center;gap:10px;margin:9px 0}
.bars .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bars .track{height:11px;background:#0c1018;border-radius:6px;overflow:hidden}
.bars .fill{height:100%;border-radius:6px;transition:width .6s}
.bars .val{text-align:right;font-variant-numeric:tabular-nums;color:var(--mut);font-size:13.5px}
table{width:100%;border-collapse:collapse;font-size:14.5px}
th{text-align:left;color:var(--mut2);font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:8px 9px;border-bottom:1px solid var(--bd)}
td{padding:11px 9px;border-bottom:1px solid #131a25}
td.n{text-align:right;font-variant-numeric:tabular-nums}
tr:hover td{background:#0e1520}
.rk{color:var(--mut2);width:24px}
.tag{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--bd2);cursor:pointer;color:var(--mut)}
.chip.on{color:#fff;border-color:transparent}
.muted{color:var(--mut)}
select,input,textarea{background:var(--bg2);border:1px solid var(--bd2);color:var(--tx);border-radius:9px;padding:9px 11px;font:inherit;font-size:13px}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--acc)}
.legend{display:flex;gap:18px;flex-wrap:wrap;font-size:15px;font-weight:600;color:var(--tx);margin-top:12px}
.legend i{display:inline-block;width:14px;height:14px;border-radius:4px;margin-right:7px;vertical-align:middle}
.post{border:1px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:12px;background:var(--panel)}
.post .cap{font-size:13px;margin-bottom:8px}
.cm{border-top:1px solid #131a25;padding:9px 0;display:flex;gap:9px;flex-wrap:wrap;align-items:flex-start}
.cm .u{font-weight:700;font-size:12.5px;color:var(--ig)}
.cm .t{font-size:13px}
.reply{display:flex;gap:7px;margin-top:6px;width:100%;flex-wrap:wrap}
.reply input{flex:1;min-width:160px}
.hide-tab{display:none}
.empty{color:var(--mut);text-align:center;padding:30px;border:1px dashed var(--bd2);border-radius:12px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #ffffff44;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
svg .gl{stroke:#1a2330;stroke-width:1}
svg text{fill:var(--mut);font-size:15px}
</style></head>
<body><div class="wrap">
<header>
  <h1><span class="dot" aria-hidden="true"></span>FacelessFactory <span style="color:var(--mut);font-weight:500">Centrála</span></h1>
  <div class="spacer"></div>
  <span class="sub" id="updated" role="status">Načítavam…</span>
  <button class="btn acc" id="refresh" onclick="refresh()">↻ Obnoviť dáta</button>
</header>

<div class="tabs" role="tablist" aria-label="Sekcie dashboardu">
  <button class="tab on" role="tab" aria-selected="true" aria-controls="overview" id="tabbtn_overview" data-t="overview">📊 Prehľad</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="growth" id="tabbtn_growth" data-t="growth">📈 Rast &amp; rady</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="platforms" id="tabbtn_platforms" data-t="platforms">📱 Platformy</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="winners" id="tabbtn_winners" data-t="winners">🏆 Víťazi</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="factories" id="tabbtn_factories" data-t="factories">🏭 Fabriky</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="comments" id="tabbtn_comments" data-t="comments">💬 Komentáre</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="docs" id="tabbtn_docs" data-t="docs">🎬 Dokumenty</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="lumora" id="tabbtn_lumora" data-t="lumora">🌙 Lumora</button>
</div>

<section id="overview" role="tabpanel" aria-labelledby="tabbtn_overview"><div class="empty"><span class="spin" aria-hidden="true"></span> Načítavam dáta…</div></section>
<section id="growth" class="hide-tab" role="tabpanel" aria-labelledby="tabbtn_growth"></section>
<section id="factories" class="hide-tab" role="tabpanel" aria-labelledby="tabbtn_factories"></section>
<section id="winners" class="hide-tab" role="tabpanel" aria-labelledby="tabbtn_winners"></section>
<section id="platforms" class="hide-tab" role="tabpanel" aria-labelledby="tabbtn_platforms"></section>
<section id="docs" class="hide-tab" role="tabpanel" aria-labelledby="tabbtn_docs"></section>
<section id="lumora" class="hide-tab" role="tabpanel" aria-labelledby="tabbtn_lumora"></section>
<section id="comments" class="hide-tab" role="tabpanel" aria-labelledby="tabbtn_comments"></section>

</div>
<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const PC={youtube:'#ff4d4f',tiktok:'#fe2c55',instagram:'#e1306c'};
const PN={youtube:'YouTube',tiktok:'TikTok',instagram:'Instagram'};
const PI={youtube:'📺',tiktok:'🎵',instagram:'📸'};
let DATA=null, HIST=[], YTDAILY=null;
const fmt=n=>n==null?'—':n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':(''+Math.round(n));
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const dur=s=>{s=Math.round(s||0);const m=Math.floor(s/60),x=s%60;return m+':'+(''+x).padStart(2,'0');};
// jednotny format dátumov naprieč celym dashboardom: 'YYYY-MM-DD' -> 'DD.MM.YYYY' (rovnaky styl ako gen_at zo servera)
const fmtDate=iso=>{if(!iso)return '—';const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(iso);return m?`${m[3]}.${m[2]}.${m[1]}`:iso;};
const fmtDateShort=iso=>{if(!iso)return '';const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(iso);return m?`${m[3]}.${m[2]}`:iso;};
function prevDay(){return HIST.length>=2?HIST[HIST.length-2]:null;}   // snapshot z predoslého dňa
function delta(cur,prev){   // velka delta pod KPI cislo (oproti POSLEDNEMU obnoveniu, nie za den)
  if(cur==null)return '';
  if(prev==null)return '<div class="dl dl0" style="opacity:.6">delta po ďalšom obnovení</div>';
  const d=cur-prev;
  if(d===0)return '<div class="dl dl0">— bez zmeny od obnovenia</div>';
  const up=d>0;
  return `<div class="dl ${up?'dlu':'dld'}">${up?'▲ +':'▼ −'}${fmt(Math.abs(d))} od posl. obnovenia</div>`;
}
function dchip(cur,prev){   // maly inline odznak (platformy/fabriky)
  if(cur==null||prev==null)return '';
  const d=cur-prev;if(d===0)return '';
  const up=d>0;return ` <span class="dchip ${up?'dlu':'dld'}">${up?'▲+':'▼−'}${fmt(Math.abs(d))}</span>`;
}
const userFac=u=>{const p=DATA.projects.find(p=>p.instagram&&p.instagram.handle===u);return p?{name:p.name,color:p.color}:{name:u,color:'#888'};};
function barChart(items,h=260){
  const W=760,H=h,pad={l:52,r:14,t:16,b:40},iw=W-pad.l-pad.r,ih=H-pad.t-pad.b;
  const mx=Math.max(1,...items.map(i=>i.v)),n=items.length;
  const bw=Math.min(120,iw/n*0.55),gap=iw/n;
  let g='';for(let k=0;k<=4;k++){const y=pad.t+ih*k/4;g+=`<line class="gl" x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}"/><text x="${pad.l-6}" y="${y+3}" text-anchor="end">${fmt(mx*(4-k)/4)}</text>`;}
  let bars=items.map((it,i)=>{const x=pad.l+gap*i+gap/2-bw/2,bh=ih*(it.v/mx),y=pad.t+ih-bh;
    const est=it.est?` fill-opacity="0.38" stroke="${it.c}" stroke-width="1.5" stroke-dasharray="4 3"`:'';
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(2,bh).toFixed(1)}" rx="5" fill="${it.c}"${est}/>`+
      `<text x="${(x+bw/2).toFixed(1)}" y="${y-5}" text-anchor="middle" fill="#cdd7e6" style="font-size:11px;font-weight:700">${it.est?'~':''}${fmt(it.v)}</text>`+
      `<text x="${(x+bw/2).toFixed(1)}" y="${H-12}" text-anchor="middle">${it.n}</text>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${g}${bars}</svg>`;
}

function allVids(){return DATA.projects.flatMap(p=>p.videos);}
function pViews(p,plat){return p.videos.filter(v=>(v.platform||'').toLowerCase()===plat).reduce((s,v)=>s+(v.views||0),0);}
function facViews(p){return p.videos.reduce((s,v)=>s+(v.views||0),0);}
/* MONOTONICKY CLAMP per fabrika/platforma (rovnaky ako server-side _held): kumulativne zhliadnutia
   NIKDY neklesnu pod najvyssie kedy zname (z historie) -> ziadny falosny pokls pri API glitchi (napr. IG). */
const _KVIEW={youtube:'yv',tiktok:'tv',instagram:'iv'};
function facMax(){const M={};(HIST||[]).forEach(h=>{const f=h.fac||{};for(const nm in f){const m=M[nm]||(M[nm]={});['yv','tv','iv'].forEach(k=>{m[k]=Math.max(m[k]||0,f[nm][k]||0);});}});return M;}
function pvHeld(p,plat){return Math.max(pViews(p,plat),(facMax()[p.name]||{})[_KVIEW[plat]]||0);}
function facFollowers(p){return (p.yt?.subs||0)+(p.tiktok?.followers||0)+(p.instagram?.followers||0);}

/* ---- jednoduchy SVG ciarovy graf (viac serii, auto-scale) ---- */
function lineChart(series, dates, h=250){
  const W=760, H=h, pad={l:52,r:16,t:16,b:30};
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  const n=dates.length;
  const maxY=Math.max(1,...series.flatMap(s=>s.pts));
  const X=i=>pad.l+(n<=1?iw/2:iw*i/(n-1));
  const Y=v=>pad.t+ih-ih*(v/maxY);
  let g='';
  for(let k=0;k<=4;k++){const y=pad.t+ih*k/4;g+=`<line class="gl" x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}"/>`+
    `<text x="${pad.l-6}" y="${y+3}" text-anchor="end">${fmt(maxY*(4-k)/4)}</text>`;}
  let paths=series.map(s=>{
    if(n===1){return `<circle cx="${X(0)}" cy="${Y(s.pts[0])}" r="3.5" fill="${s.c}"/>`;}
    const d=s.pts.map((v,i)=>`${i?'L':'M'}${X(i).toFixed(1)} ${Y(v).toFixed(1)}`).join(' ');
    return `<path d="${d}" fill="none" stroke="${s.c}" stroke-width="2.2" stroke-linejoin="round"/>`+
      `<circle cx="${X(n-1)}" cy="${Y(s.pts[n-1])}" r="3" fill="${s.c}"/>`;
  }).join('');
  const xl=n?`<text x="${X(0)}" y="${H-6}" text-anchor="start">${fmtDateShort(dates[0])}</text>`+
    (n>1?`<text x="${X(n-1)}" y="${H-6}" text-anchor="end">${fmtDateShort(dates[n-1])}</text>`:''):'';
  const leg=`<div class="legend">`+series.map(s=>`<span><i style="background:${s.c}"></i>${s.name}</span>`).join('')+`</div>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${g}${paths}${xl}</svg>${leg}`;
}

/* ---- denny prirastok (bar graf po dnoch): kolko views/sledov. PRIBUDLO kazdy den ---- */
const totViews=h=>(h.yt_views||0)+(h.tk_views||0)+(h.ig_views||0);
const totFoll=h=>(h.yt_subs||0)+(h.tk_foll||0)+(h.ig_foll||0);
function gainBars(totalFn,color,ytField){
  if(!HIST||HIST.length<2)return '<div class="empty">Graf po dňoch sa zapne pri 2+ dňoch histórie (zbiera sa každým obnovením).</div>';
  // prirastok = dnesny snapshot MINUS vcerajsi (den po dni). Ak medzi dvoma REALNYMI snapshotmi
  // chyba den (cloud spal), skusime dopocitat REALNE denne cisla z YouTube Analytics (yt_daily.json);
  // ak ich Analytics este nema, ukazeme 1 suhrnny odhadovy stlpec (~).
  const H=HIST.filter(h=>!h.gap);   // ignoruj 'gap' dni (prenesene fake hodnoty) -> rozdiel medzi REALNYMI snapshotmi
  if(H.length<2)return '<div class="empty">Zatiaľ málo reálnych dní — doplní sa ďalším 23:59 snapshotom.</div>';
  const YD=(YTDAILY&&YTDAILY.days)||{};
  const dayKey=dt=>dt.toISOString().slice(0,10);
  let anyEst=false;
  const items=[];
  for(let i=1;i<H.length;i++){
    const a=H[i-1],b=H[i];
    const days=Math.max(1,Math.round((new Date(b.date)-new Date(a.date))/864e5));
    const total=Math.max(0,totalFn(b)-totalFn(a));
    if(days===1){
      items.push({n:b.date.slice(5),c:color,v:total});
      continue;
    }
    // diera: rozdel chybajuce dni na REALNE (YT Analytics uz ma) a ESTE NEFINALIZOVANE (odhad)
    const miss=[];for(let d=1;d<=days;d++)miss.push(new Date(new Date(a.date).getTime()+d*864e5));
    const covered=[],uncovered=[];
    miss.forEach(dt=>{
      const yd=YD[dayKey(dt)];
      if(ytField && yd && typeof yd[ytField]==='number' && yd[ytField]>=0) covered.push({dt,v:yd[ytField]});
      else uncovered.push(dt);
    });
    const cSum=covered.reduce((s,x)=>s+x.v,0);
    if(covered.length && uncovered.length===0 && cSum>0){
      // CELA diera pokryta realnymi YT datami -> skaluj tak, aby sucet sedel s celkovym (YT+TT+IG) prirastkom
      const f=total/cSum;
      covered.forEach(x=>items.push({n:dayKey(x.dt).slice(5),c:color,v:Math.round(x.v*f)}));
    }else{
      // realne dni (co YouTube uz finalizoval) zobraz naozaj; zvysne (este nefinalizovane) 1 odhadom
      covered.forEach(x=>items.push({n:dayKey(x.dt).slice(5),c:color,v:Math.round(x.v)}));
      if(uncovered.length){
        anyEst=true;
        const rem=Math.max(0,total-cSum),per=Math.round(rem/uncovered.length);
        const from=dayKey(uncovered[0]).slice(8,10),to=dayKey(uncovered[uncovered.length-1]).slice(8,10);
        const lbl=uncovered.length===1?dayKey(uncovered[0]).slice(5):(from+'.–'+to+'.');
        items.push({n:lbl,c:color,v:per,est:true,days:uncovered.length});
      }
    }
  }
  const note=anyEst?'<div class="muted" style="font-size:11px;margin-top:6px">~ = obdobie bez denného zberu (cloud spal) — priemer/deň; celkový prírastok je reálny. Presné denné čísla sa doplnia keď YouTube Analytics dobehne (~3 dni).</div>':'';
  return barChart(items.slice(-12))+note;
}

/* ---------------- PREHLAD ---------------- */
function renderOverview(){
  const t=DATA.totals;
  const foll=t.yt_subs+t.tk_foll+t.ig_foll;
  const views=t.yt_views+t.tk_views+t.ig_views;
  const vids=allVids().length;
  const PV=DATA.prev||{}, hp=Object.keys(PV).length>0;   // prev = stav z POSLEDNEHO obnovenia (data.json)
  const Pf=hp?((PV.yt_subs||0)+(PV.tk_foll||0)+(PV.ig_foll||0)):null;
  const Pv=hp?((PV.yt_views||0)+(PV.tk_views||0)+(PV.ig_views||0)):null;
  const kpis=[
    ['Fabriky',t.factories,'plne automatické v cloude',t.factories,hp?PV.factories:null],
    ['Sledovatelia',fmt(foll),`YT ${fmt(t.yt_subs)} · TT ${fmt(t.tk_foll)} · IG ${fmt(t.ig_foll)}`,foll,Pf],
    ['Zhliadnutia',fmt(views),`YT ${fmt(t.yt_views)} · TT ${fmt(t.tk_views)} · IG ${fmt(t.ig_views)}`,views,Pv],
    ['Videá / príspevky',vids,'naprieč platformami',vids,hp?PV.videos:null],
  ];
  const dates=HIST.map(h=>h.date);
  const trend=HIST.length>=2;   // ciarovy graf az ked mame aspon 2 dni historie
  const followChart=trend?lineChart([
      {name:'YouTube',c:PC.youtube,pts:HIST.map(h=>h.yt_subs||0)},
      {name:'TikTok',c:PC.tiktok,pts:HIST.map(h=>h.tk_foll||0)},
      {name:'Instagram',c:PC.instagram,pts:HIST.map(h=>h.ig_foll||0)},],dates)
    :barChart([{n:'📺 YouTube',c:PC.youtube,v:t.yt_subs},{n:'🎵 TikTok',c:PC.tiktok,v:t.tk_foll},{n:'📸 Instagram',c:PC.instagram,v:t.ig_foll}]);
  const viewChart=trend?lineChart([
      {name:'YouTube',c:PC.youtube,pts:HIST.map(h=>h.yt_views||0)},
      {name:'TikTok',c:PC.tiktok,pts:HIST.map(h=>h.tk_views||0)},
      {name:'Instagram',c:PC.instagram,pts:HIST.map(h=>h.ig_views||0)},],dates)
    :barChart([{n:'📺 YouTube',c:PC.youtube,v:t.yt_views},{n:'🎵 TikTok',c:PC.tiktok,v:t.tk_views},{n:'📸 Instagram',c:PC.instagram,v:t.ig_views}]);
  const note=trend?'':`<div class="muted" style="font-size:14.5px;margin-top:12px;line-height:1.5">📈 Teraz aktuálny stav podľa platformy. <b>Krivka rastu</b> sa zapne keď budeš mať históriu aspoň 2 dni (zbiera sa každým obnovením dát).</div>`;

/* ---------------- RAST & RADY ---------------- */
function dayDelta(d,inline,lbl){
  lbl=lbl||'za posledný deň';
  if(d==null)return '';
  if(d===0)return inline?'<span class="muted">0</span>':'<div class="dl dl0">— bez zmeny za deň</div>';
  const up=d>0;
  if(inline)return `<span class="dchip ${up?'dlu':'dld'}">${up?'▲+':'▼−'}${fmt(Math.abs(d))}</span>`;
  return `<div class="dl ${up?'dlu':'dld'}">${up?'▲ +':'▼ −'}${fmt(Math.abs(d))} ${lbl}</div>`;
}
function tipOfDay(){
  const ever=[
    'Prvé 2 sekundy = všetko. Hook musí udrieť hneď, žiaden pomalý intro.',
    'Víťazné videá ručne prepostni v appke s trending zvukom — legálny algoritmický boost.',
    'Konzistencia > dokonalosť. 3 videá denne porazia 1 perfektné za týždeň.',
    'Sleduj ktoré témy vyhrávajú (tab Víťazi) a rob ich varianty — algoritmus odmeňuje sériu.',
    'Každé video nech má jasné „Follow" CTA na konci — inak views nemenia na sledovateľov.',
    'Odpovedaj na komentáre (tab Komentáre) — zvyšuje dosah a buduje komunitu.',
  ];
  return ever[Math.floor(Date.now()/864e5)%ever.length];
}
function buildTips(t,P,dFoll,dViews,unitTxt){
  const unit=' videní '+(unitTxt||'za deň');
  const tips=[];
  const pg=[['youtube',t.yt_views-(P.yt_views||0)],['tiktok',t.tk_views-(P.tk_views||0)],
            ['instagram',t.ig_views-(P.ig_views||0)]].sort((a,b)=>b[1]-a[1]);
  if(pg[0][1]>0)tips.push(`${PI[pg[0][0]]} <b>${PN[pg[0][0]]}</b> rastie najrýchlejšie (+${fmt(pg[0][1])}${unit}) — daj tam viac, ide ti to.`);
  const facV=DATA.projects.map(p=>({n:p.name,v:facViews(p)})).sort((a,b)=>b.v-a.v);
  if(facV[0]&&facV[0].v>0)tips.push(`🏆 <b>${facV[0].n}</b> vedie (${fmt(facV[0].v)} videní) — pozri jeho top videá vo Víťazoch a replikuj štýl/hooky.`);
  const weak=facV[facV.length-1];
  if(weak&&facV[0]&&weak.v<facV[0].v*0.15)tips.push(`⚠️ <b>${weak.n}</b> má zatiaľ najmenej videní (${fmt(weak.v)}) — daj mu čas alebo skús iný formát/tému.`);
  if(dViews>0&&dFoll<=0)tips.push('💬 Videní pribúda, sledovateľov nie — over že každé video má „Follow" CTA na konci.');
  tips.push(tipOfDay());
  return tips.slice(0,4);
}
/* 'vcerajsok' pre tab Rast = 1 den spat od dneska. Ak medzi poslednymi REALNYMI snapshotmi
   je diera (vypadok zberu), dopocita sa priemerny 1-dnovy krok (presne ako stlpce v grafe). */
function effYesterday(){
  const real=(HIST||[]).filter(h=>!h.gap);
  const t=DATA.totals;
  if(!t||real.length<2)return null;
  const today=real[real.length-1], P=real[real.length-2];
  const days=Math.max(1,Math.round((new Date(today.date)-new Date(P.date))/864e5));
  const y={_est:days>1};
  ['yt_subs','yt_views','tk_foll','tk_views','ig_foll','ig_views','videos'].forEach(k=>{
    y[k]=(t[k]||0)-((t[k]||0)-(P[k]||0))/days;   // ZIVE totals dnes minus 1 priemerny den
  });
  return y;
}

/* ---------------- FABRIKY ---------------- */
/* zdravie fabriky podla Buffer fronty: chyby -> cervena, prazdna fronta -> zlta.
   POZOR: Buffer API ma rate-limit (429) — ked data nie su (alive=false, nic sent),
   NEznamena to prazdnu frontu, len nedostupny stav -> siva, ziadny poplach. */
function facHealth(p){
  const noData=!p.alive&&!(p.sent>0)&&!p.last_sent;
  if(noData)return ['⚪','Buffer stav nedostupný (rate-limit) — skús Obnoviť neskôr',true];
  if((p.errors||0)>0)return ['🔴','chyby v Bufferi: '+p.errors];
  if((p.scheduled||0)===0)return ['🟡','fronta prázdna — nič nie je naplánované'];
  return ['🟢','fronta OK · čaká '+p.scheduled];
}
/* klik na "Vývoj po dňoch" -> denna krivka fabriky (views YT/TT/IG z historie) */
function facTrend(name,idx){
  const el=document.getElementById('ftr_'+idx);
  if(!el)return;
  if(el.innerHTML){el.innerHTML='';return;}
  const days=(HIST||[]).filter(h=>h.fac&&h.fac[name]);
  if(days.length<2){el.innerHTML='<div class="empty">Krivka sa zapne pri 2+ dňoch histórie tejto fabriky.</div>';return;}
  const dates=days.map(h=>h.date);
  const f=k=>days.map(h=>(h.fac[name]||{})[k]||0);
  el.innerHTML='<div style="margin-top:10px">'+lineChart([
    {name:'YouTube',c:PC.youtube,pts:f('yv')},
    {name:'TikTok',c:PC.tiktok,pts:f('tv')},
    {name:'Instagram',c:PC.instagram,pts:f('iv')}],dates,180)+'</div>';
}

  const subs=p.yt?p.yt.subs:0;
  const tot=vids.reduce((s,v)=>s+(v.views||0),0);
  const avg=vids.length?vids.reduce((s,v)=>s+(v.duration||0),0)/vids.length:0;
  const kp=[['Videí',vids.length,'ambient'],['Odberatelia',fmt(subs),'YouTube'],['Zhliadnutia',fmt(tot),'spolu'],['Priem. dĺžka',dur(avg),'min:sek']];
  const rows=vids.length?vids.map((v,i)=>`<tr>
    <td class="rk">${i+1}</td>
    <td><a href="${v.link}" target="_blank" rel="noopener noreferrer">${esc((v.title||'').slice(0,70))}</a></td>
    <td class="n">${dur(v.duration)}</td>
    <td class="n"><b>${fmt(v.views)}</b></td><td class="n">${fmt(v.likes)}</td><td class="n">${fmt(v.comments)}</td>
    <td class="muted" style="font-size:12px">${fmtDate(v.published)}</td></tr>`).join(''):`<tr><td colspan="7"><div class="empty">Zatiaľ žiadne videá — objavia sa po nahratí na kanál Lumora.</div></td></tr>`;
  $('#lumora').innerHTML=`
    <div class="grid k4" style="margin-bottom:14px">${kp.map(k=>`<div class="card kpi" style="border-top:3px solid ${C}"><div class="lab">${k[0]}</div><div class="big">${k[1]}</div><div class="sm">${k[2]}</div></div>`).join('')}</div>
    <div class="card" style="margin-bottom:14px"><h2><span style="color:${C}">🌙 Lumora</span> <small>ambient hudba · YouTube long-form + Spotify</small></h2>
      <div class="sm" style="color:var(--mut)">Dlhé ambient videá (focus / study / sleep) — monetizácia cez čas sledovania. Rovnaká hudba ide aj na Spotify ako krátke skladby.</div></div>
    <div class="card"><h2>🎧 Videá Lumory</h2>
      <table><thead><tr><th>#</th><th>Video</th><th class="n">Dĺžka</th><th class="n">Views</th><th class="n">Likes</th><th class="n">Kom.</th><th>Dátum</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
}

/* ---------------- KOMENTARE ---------------- */
function renderComments(){
  $('#comments').innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <h2>💬 Správa komentárov <small>Instagram + YouTube · všetky účty naraz</small></h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <button class="btn acc" onclick="loadComments()">↻ Načítať komentáre zo všetkých účtov</button>
        <button class="btn" onclick="markAllShown()" title="Označí všetky práve zobrazené komentáre ako vybavené (YouTube ostávajú, len zmiznú odtiaľto)">✓ Vybaviť všetky zobrazené</button>
        <span class="muted" style="font-size:12px">ℹ️ IG: odpoveď + skrytie priamo tu. YouTube: zobrazené (odpoveď cez tlačidlo na YT).</span>
      </div>
    </div>
    <div id="cbody"><div class="empty">Klikni „Načítať komentáre zo všetkých účtov".</div></div>`;
}
async function loadComments(){
  $('#cbody').innerHTML=`<div class="empty"><span class="spin"></span> Načítavam komentáre (Instagram + YouTube)…</div>`;
  try{
    const r=await fetch('/api/all_comments');
    const d=await r.json();
    if(d.error){$('#cbody').innerHTML=`<div class="empty">Chyba: ${esc(d.error)}</div>`;return;}
    // zobraz len NEVYBAVENE: komentar s lajkom (like_count>0) = vybaveny -> automaticky preč
    // IG: komentar s lajkom (ty si lajkol) = vybaveny -> prec. YT: zobraz vsetky (read-only).
    const posts=(d.media||[]).map(m=>({...m,open:(m.comments||[]).filter(c=> m.platform==='youtube' ? true : !(c.like_count>0))}))
                             .filter(m=>m.open.length);
    if(!posts.length){$('#cbody').innerHTML=`<div class="empty">Žiadne nevybavené komentáre. 🎉<br><span style="font-size:12px">(Lajknuté IG komentáre sa odtiaľto automaticky stratia. Účty sú zatiaľ nové — keď prídu komentáre, objavia sa tu.)</span></div>`;return;}
    $('#cbody').innerHTML=posts.map(m=>{
      const yt=m.platform==='youtube';
      const f=yt?{name:m.user,color:'#ff4d4d'}:userFac(m.user);
      const icon=yt?'📺':'📸';
      return `<div class="post" id="post_${m.id}" style="border-left:3px solid ${f.color}">
        <div class="cap">
          <span class="tag" style="background:${f.color}22;color:${f.color}">${icon} ${esc(f.name)}</span>
          <a href="${m.permalink}" target="_blank" rel="noopener noreferrer">${esc(m.caption)||'(príspevok)'}</a></div>
        ${m.open.map(c=>`<div class="cm" id="cm_${c.id}">
          <div style="flex:1">
            <span class="u">@${esc(c.username||'?')}</span> <span class="t">${esc(c.text||'')}</span>
            ${yt?`<div class="reply"><a class="btn" href="${m.permalink}" target="_blank" rel="noopener noreferrer">Odpovedať na YouTube ↗</a>
              <button class="btn" onclick="markDone('${c.id}','${m.id}')">✓ Vybavené</button></div>`
                :`<div class="reply">
              <input placeholder="Odpoveď…" aria-label="Odpoveď na komentár" id="r_${c.id}">
              <button class="btn" onclick="sendReply('${m.user}','${c.id}','${m.id}')">Odpovedať</button>
              <button class="btn" onclick="hideC('${m.user}','${c.id}','${m.id}')">Skryť</button>
              <button class="btn" onclick="markDone('${c.id}','${m.id}')">✓ Vybavené</button>
            </div>`}
          </div></div>`).join('')}
      </div>`;}).join('');
  }catch(e){$('#cbody').innerHTML=`<div class="empty">Chyba spojenia: ${esc(''+e)}</div>`;}
}
async function markAllShown(){          // hromadne: vsetky prave zobrazene komentare -> vybavene
  const cms=[...document.querySelectorAll('#cbody .cm')];
  if(!cms.length){alert('Najprv načítaj komentáre.');return;}
  if(!confirm('Označiť všetkých '+cms.length+' zobrazených komentárov ako vybavené? (YouTube komentáre sa NEmažú, len zmiznú z dashboardu)'))return;
  let ok=0;
  for(const el of cms){
    const cid=el.id.replace(/^cm_/,'');
    try{ await fetch('/api/comment_done',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({comment_id:cid})}); ok++; }catch(e){}
  }
  $('#cbody').innerHTML='<div class="empty">Hotovo — '+ok+' komentárov označených ako vybavené. 🎉</div>';
}
function dropComment(cid,pid){            // odstrani komentar; ak je prispevok prazdny, odstrani aj prispevok
  const el=$('#cm_'+cid); if(el)el.remove();
  const post=$('#post_'+pid); if(post&&!post.querySelector('.cm'))post.remove();
  if(!$('#cbody').querySelector('.post'))$('#cbody').innerHTML='<div class="empty">Žiadne nevybavené komentáre. 🎉</div>';
}
async function markDone(cid,pid){         // "Vybavené" -> trvalo zmizne z dashboardu (aj po reload/restart)
  try{ await fetch('/api/comment_done',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({comment_id:cid})}); }catch(e){}
  dropComment(cid,pid);
}
async function sendReply(user,cid,pid){
  const inp=$('#r_'+cid); const msg=inp.value.trim(); if(!msg)return;
  inp.disabled=true; inp.placeholder='…';
  const r=await fetch('/api/reply',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user,comment_id:cid,message:msg})});
  const d=await r.json();
  if(d.ok){dropComment(cid,pid);}                 // odpovedané -> automaticky preč
  else{inp.disabled=false;inp.placeholder='Odpoveď…';alert('Chyba: '+(d.error||'?'));}
}
async function hideC(user,cid,pid){
  const r=await fetch('/api/hide',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user,comment_id:cid,hide:true})});
  const d=await r.json();
  if(d.ok){dropComment(cid,pid);} else alert('Chyba: '+(d.error||'?'));
}

/* ---------------- INFRA ---------------- */
function show(t){
  $$('.tab').forEach(b=>{const on=b.dataset.t===t; b.classList.toggle('on',on); b.setAttribute('aria-selected',on?'true':'false');});
  ['overview','growth','factories','winners','platforms','docs','lumora','comments'].forEach(s=>$('#'+s).classList.toggle('hide-tab',s!==t));
  if(t==='growth')renderGrowth(); if(t==='factories')renderFactories(); if(t==='winners')renderWinners();
  if(t==='platforms')renderPlatforms(); if(t==='docs')renderDocs(); if(t==='lumora')renderLumora(); if(t==='comments')renderComments();
}
$$('.tab').forEach(b=>b.onclick=()=>show(b.dataset.t));
async function refresh(){
  const b=$('#refresh'); b.innerHTML='<span class="spin" aria-hidden="true"></span> Obnovujem…'; b.disabled=true;
  try{await fetch('/api/refresh');}catch(e){/* server nedostupny -> skus aspon nacitat existujuce data nizsie */}
  await load(); b.innerHTML='↻ Obnoviť dáta'; b.disabled=false;
}
// bezpecne totals so vsetkymi klucmi na 0 -> ziadne "NaN" ked su data.json prazdne (prvy beh / vypadok API)
function normalizeData(d){
  d=d||{};
  d.totals=Object.assign({factories:0,yt_subs:0,yt_views:0,tk_foll:0,tk_views:0,tk_likes:0,
    ig_foll:0,ig_views:0,ig_posts:0,ig_videos:0,videos:0,ig_blocked:false},d.totals||{});
  d.projects=Array.isArray(d.projects)?d.projects:[];
  d.prev=d.prev||{};
  return d;
}
async function load(){
  try{
    const [dRes,hRes,yRes]=await Promise.all([fetch('/data.json?'+Date.now()),fetch('/history.json?'+Date.now()),fetch('/yt_daily.json?'+Date.now()).catch(()=>null)]);
    if(!dRes.ok)throw new Error('server vratil '+dRes.status);
    DATA=normalizeData(await dRes.json());
    HIST=hRes.ok?await hRes.json():[];
    if(!Array.isArray(HIST))HIST=[];
    try{ YTDAILY=(yRes&&yRes.ok)?await yRes.json():null; }catch(e){ YTDAILY=null; }
  }catch(e){
    $('#updated').textContent='chyba načítania';
    $('#overview').innerHTML=`<div class="empty">⚠️ Dáta sa nepodarilo načítať (${esc(''+e.message||e)}).<br>
      Skontroluj či beží <code>server.py</code>, alebo skús <button class="btn" style="display:inline-flex" onclick="load()">↻ skúsiť znova</button>.</div>`;
    return;
  }
  $('#updated').textContent=DATA.gen_at?('aktualizované '+DATA.gen_at):'zatiaľ žiadne dáta';
  if(!DATA.projects.length){
    $('#overview').innerHTML=`<div class="empty">📭 Zatiaľ žiadne fabriky/dáta. Spusti <code>python generate.py</code>
      (alebo klikni „↻ Obnoviť dáta" hore) na prvé natiahnutie štatistík.</div>`;
    return;
  }
  renderOverview();
  const on=$('.tab.on')?.dataset.t||'overview'; if(on!=='overview')show(on);
}
load();
</script></body></html>
