name: Zaloha historie

# Kazdy vecer stiahne history.json z Rendera a commitne do repa.
# Vdaka tomu ziadny redeploy/restart uz NIKDY nezmaze denne data
# (git commit = trvala zaloha kazdy den; generate.py ju pri starte zluci).
# POTREBUJE secret DASH_PASS (heslo dashboardu) v Settings -> Secrets -> Actions.

on:
  schedule:
    - cron: "40 21 * * *"   # ~23:40 Bratislava - snapshot na konci dna
  workflow_dispatch: {}      # rucne spustenie na test

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stiahni a zluc historiu z Rendera
        env:
          DASH_PASS: ${{ secrets.DASH_PASS }}
          DASH_URL: https://facelessfactory-dashboard.onrender.com
        run: |
          python - <<'PY'
          import json, os, base64, urllib.request, sys
          url = os.environ["DASH_URL"].rstrip("/") + "/history.json"
          req = urllib.request.Request(url, headers={"User-Agent": "ff-backup"})
          pw = os.environ.get("DASH_PASS", "")
          if pw:
              req.add_header("Authorization", "Basic " + base64.b64encode(("dash:" + pw).encode()).decode())
          try:
              remote = json.load(urllib.request.urlopen(req, timeout=90))
          except Exception as e:
              print("Zaloha preskocena (Render spi / chyba heslo v secrets?):", e)
              sys.exit(0)
          local = json.load(open("history.json", encoding="utf-8")) if os.path.exists("history.json") else []
          by = {h["date"]: h for h in local if isinstance(h, dict) and h.get("date")}
          for h in (remote if isinstance(remote, list) else []):
              if isinstance(h, dict) and h.get("date"):
                  by[h["date"]] = h          # Render (novsie) prepise ten isty den
          merged = [by[d] for d in sorted(by)][-180:]
          json.dump(merged, open("history.json", "w", encoding="utf-8"), ensure_ascii=False, indent=2)
          print("dni v zalohe:", len(merged))
          PY

      - name: Commitni ak sa zmenila
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --cached --quiet || { git commit -m "zaloha: history $(date -u +%F)"; git push; }
